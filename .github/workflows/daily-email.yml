name: Daily Brief & Market Update

on:
  schedule:
    - cron: '0 3 * * *'  # 6am UTC = 2pm PH (UTC+8)
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send email
        run: python send_email.py
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -H "Title: Daily Brief Failed" \
               -H "Priority: high" \
               -H "Tags: warning" \
               -d "The daily brief automation failed at $(date -u). Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
               https://ntfy.sh/daily-brief-julius
